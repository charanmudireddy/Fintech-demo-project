apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-project-platform-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/charanmudireddy/Fintech-demo-project.git
    targetRevision: HEAD
    path: helm/demo-project-api
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-project
  syncPolicy:
    automated:
      prune: true
      selfHeal: true